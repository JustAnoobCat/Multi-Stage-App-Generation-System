<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Compiler</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; padding: 2rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #ffffff; }
        p { font-size: 0.9rem; color: #888; margin-bottom: 1.5rem; }
        textarea {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            border-radius: 6px;
            resize: vertical;
        }
        button {
            margin-top: 1rem;
            padding: 0.75rem 2rem;
            background: #ffffff;
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: monospace;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { background: #444; color: #888; cursor: default; }
        #status { margin-top: 1rem; font-size: 0.85rem; color: #888; }
        #validation { margin-top: 1.5rem; }
        .check { padding: 0.4rem 0; font-size: 0.85rem; border-bottom: 1px solid #1e1e1e; }
        .pass { color: #4caf50; }
        .fixed { color: #2196f3; }
        #output {
            margin-top: 1.5rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 1rem;
            white-space: pre-wrap;
            font-size: 0.8rem;
            max-height: 600px;
            overflow-y: auto;
            color: #a8d8a8;
        }
    </style>
</head>
<body>
    <h1>App Compiler</h1>
    <p>Natural language → structured app schema</p>

    <textarea id="prompt" placeholder="Describe the app you want to build...
Example: Build a CRM with login, contacts, dashboard, role-based access, and premium plan with payments."></textarea>

    <button id="compileBtn" onclick="compile()">Compile</button>
    <div id="status"></div>
    <div id="validation"></div>
    <pre id="output"></pre>

    <script>
        async function compile() {
            const prompt = document.getElementById("prompt").value.trim();
            if (!prompt) return;

            const btn = document.getElementById("compileBtn");
            const status = document.getElementById("status");
            const output = document.getElementById("output");
            const validation = document.getElementById("validation");

            btn.disabled = true;
            btn.textContent = "Compiling...";
            status.textContent = "Running pipeline... this takes 15-20 seconds";
            output.textContent = "";
            validation.innerHTML = "";

            try {
                const response = await fetch("http://localhost:5000/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                // Show validation results
                validation.innerHTML = "<strong>Validation:</strong><br>" +
                    data.validation.map(v => {
                        const cls = v.passed ? "pass" : "fixed";
                        const icon = v.passed ? "✓" : "⚡";
                        const fix = v.fix ? ` → ${v.fix}` : "";
                        return `<div class="check ${cls}">${icon} ${v.check}${fix}</div>`;
                    }).join("");
                
                // Show generated files
                const files = data.generated_files;
                const fileList = document.createElement("div");
                fileList.innerHTML = "<br><strong>Generated Files:</strong><br>" + 
                    files.map(f => `<div style="color: #888; font-size: 0.8rem;">📄 ${f}</div>`).join("");
                validation.appendChild(fileList);
                // Show schema
                output.textContent = JSON.stringify(data.schema, null, 2);
                status.textContent = "Done.";

            } catch (err) {
                status.textContent = "Error: " + err.message;
            }

            btn.disabled = false;
            btn.textContent = "Compile";
        }
    </script>
</body>
</html>
